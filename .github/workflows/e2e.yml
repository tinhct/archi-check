name: End-to-End Staging Tests

on:
  deployment_status:

jobs:
  e2e-tests:
    name: Playwright E2E GitHub Simulation
    # Run only when a Vercel Preview deployment succeeds
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'Preview'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Dynamically Update QA GitHub App Webhook URL
        run: |
          DEPLOYMENT_URL="${{ github.event.deployment_status.target_url }}"
          WEBHOOK_URL="${DEPLOYMENT_URL}/api/webhook"
          echo "Vercel Preview URL: ${DEPLOYMENT_URL}"
          echo "Updating QA GitHub App Webhook URL to: ${WEBHOOK_URL}"
          
          # Use GitHub API to update App settings (requires GITHUB_APP_CONFIG_TOKEN)
          # Note: In a real environment, GITHUB_APP_CONFIG_TOKEN has write access to the App settings
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_APP_CONFIG_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/app \
            -d "{\"webhook_url\":\"${WEBHOOK_URL}\"}"
        env:
          GITHUB_APP_CONFIG_TOKEN: ${{ secrets.GITHUB_APP_CONFIG_TOKEN }}

      - name: Run Playwright E2E Tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
          GITHUB_TOKEN: ${{ secrets.QA_BOT_GITHUB_TOKEN }}
          GITHUB_STORAGE_STATE_JSON: ${{ secrets.QA_BOT_STORAGE_STATE_JSON }}
          GITHUB_USER: ${{ secrets.QA_BOT_USER }}
          GITHUB_PASSWORD: ${{ secrets.QA_BOT_PASSWORD }}
          GITHUB_TOTP_SECRET: ${{ secrets.QA_BOT_TOTP_SECRET }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}

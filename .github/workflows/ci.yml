name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: 'archi-check/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: archi-check

      - name: Run Linter
        run: npm run lint
        working-directory: archi-check

      - name: Run Tests
        run: npm run test --run
        working-directory: archi-check

  secret-scanning:
    name: GitGuardian Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # scan all commits

      - name: GitGuardian Scan
        uses: GitGuardian/ggshield-action@v1.27.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
